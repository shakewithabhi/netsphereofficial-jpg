name: iOS CI

on:
  push:
    branches: [main]
    paths: ['ios/**']
  pull_request:
    branches: [main]
    paths: ['ios/**']

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Build
        run: |
          xcodebuild build \
            -project ios/ByteBox.xcodeproj \
            -scheme ByteBox \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
