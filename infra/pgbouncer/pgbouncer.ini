[databases]
; Primary (read-write)
bytebox = host=postgres port=5432 dbname=bytebox

; Read replica (uncomment when replica is available)
; bytebox_ro = host=postgres-replica port=5432 dbname=bytebox

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Connection pooling
pool_mode = transaction
default_pool_size = 25
min_pool_size = 5
max_client_conn = 200
max_db_connections = 50

; Timeouts
server_idle_timeout = 300
client_idle_timeout = 600
query_timeout = 30
query_wait_timeout = 120

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Admin
admin_users = bytebox
