version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bytebox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bytebox}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:-bytebox}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bytebox}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: bytebox-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bytebox-api
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bytebox-worker
    restart: unless-stopped
    command: ["./worker"]
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: bytebox-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:?MEILISEARCH_API_KEY required}
      MEILI_ENV: production
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  clamav:
    image: clamav/clamav:stable
    container_name: bytebox-clamav
    restart: unless-stopped
    volumes:
      - clamdata:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - internal

  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
    container_name: bytebox-admin
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: bytebox-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - admin
    networks:
      - internal

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: bytebox-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - internal

  grafana:
    image: grafana/grafana:latest
    container_name: bytebox-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - internal

  node-exporter:
    image: prom/node-exporter:latest
    container_name: bytebox-node-exporter
    restart: unless-stopped
    networks:
      - internal

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: bytebox-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-bytebox}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-bytebox}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: bytebox-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

volumes:
  pgdata:
  promdata:
  grafanadata:
  meilidata:
  clamdata:

networks:
  internal:
    driver: bridge
