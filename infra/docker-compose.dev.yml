version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bytebox-postgres
    environment:
      POSTGRES_USER: bytebox
      POSTGRES_PASSWORD: bytebox
      POSTGRES_DB: bytebox
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bytebox"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: bytebox-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio:
    image: minio/minio
    container_name: bytebox-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - miniodata:/data
    networks:
      - internal

  clamav:
    image: clamav/clamav:1.4
    container_name: bytebox-clamav-dev
    restart: unless-stopped
    volumes:
      - clamav-data:/var/lib/clamav
    networks:
      - internal

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bytebox-api-dev
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin
      CLAMAV_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bytebox-worker-dev
    command: ["./worker"]
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin
      CLAMAV_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # Auto-create buckets on startup
  minio-init:
    image: minio/mc
    container_name: bytebox-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/bytebox-files;
      mc mb --ignore-existing local/bytebox-thumbnails;
      mc mb --ignore-existing local/bytebox-temp;
      echo 'Buckets created successfully';
      "
    networks:
      - internal

volumes:
  pgdata:
  miniodata:
  clamav-data:

networks:
  internal:
    driver: bridge
