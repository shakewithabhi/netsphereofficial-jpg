version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bytebox-postgres
    environment:
      POSTGRES_USER: bytebox
      POSTGRES_PASSWORD: bytebox
      POSTGRES_DB: bytebox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bytebox"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bytebox-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: bytebox-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # Auto-create buckets on startup
  minio-init:
    image: minio/mc
    container_name: bytebox-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/bytebox-files;
      mc mb --ignore-existing local/bytebox-thumbnails;
      mc mb --ignore-existing local/bytebox-temp;
      echo 'Buckets created successfully';
      "

volumes:
  pgdata:
  miniodata:
